# ============================================
# 数据资产管理平台 — Nginx 配置
# 放置于 /etc/nginx/conf.d/data-asset.conf
# ============================================

server {
    listen       80;
    server_name  10.10.8.83;

    charset      utf-8;
    client_max_body_size 50m;

    # 访问日志
    access_log  /var/log/nginx/data-asset-access.log;
    error_log   /var/log/nginx/data-asset-error.log;

    # CORS 通用头
    add_header Access-Control-Allow-Origin  $http_origin always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With" always;
    add_header Access-Control-Allow-Credentials true always;

    if ($request_method = OPTIONS) {
        return 204;
    }

    # ========== 后端 API 反向代理 ==========
    location /api/ {
        proxy_pass          http://127.0.0.1:8000/api/;
        proxy_http_version  1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout    300s;
        proxy_send_timeout    300s;
        proxy_connect_timeout 30s;

        # WebSocket 支持 (如需要)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $http_connection;
    }

    # ========== 前端静态文件 ==========
    # 根路径 → SPA 入口
    location / {
        root      /opt/data-asset/frontend-dist;
        index     index.html;
        try_files $uri $uri/ /index.html;
    }

    # 静态资源 (dist/static/ 目录)
    location /static/ {
        alias  /opt/data-asset/frontend-dist/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # 资产包文件 (dist/assets/)
    location /assets/ {
        alias  /opt/data-asset/frontend-dist/assets/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
